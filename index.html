<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Igreja Quadrangular Família Global</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .logo {
            width: 280px;
            height: 280px;
            margin-bottom: 30px;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: #ffd700;
        }
        .aviso {
            font-size: 1.3rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        .contato {
            margin-top: 30px;
            font-size: 1rem;
            opacity: 0.75;
        }
        @media (max-width: 500px) {
            .logo { width: 200px; height: 200px; }
            h1 { font-size: 1.6rem; }
            .aviso { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <!-- Coloque a sua logo aqui: basta fazer upload da imagem no repositório e trocar "logo-igreja.png" pelo nome do arquivo -->
    <img src="logo-igreja.png" alt="Logo Igreja Quadrangular Família Global" class="logo">

    <h1>Igreja Quadrangular Família Global</h1>
    <p class="aviso">Nosso site está em construção...</p>
    <p class="aviso">Em breve teremos novidades especiais para você!</p>

    <div class="contato">
        <p>Contato: William Ortiz - WhatsApp 41-99772-1943</p>
        <p>Agradecemos a sua compreensão ❤️</p>
    </div>
</body>
</html>
